    </div>

            </header>

            <div
                style="max-width: 800px; background: var(--surface); padding: var(--space-2xl); border-radius: var(--radius); border: 1px solid var(--border);">
                <form>
                    <div
                        style="display: flex; align-items: center; gap: var(--space-xl); margin-bottom: var(--space-2xl);">
                        <img src="https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=150"
                            alt="Avatar" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover;">
                        <div>
                            <button type="button" class="btn btn-outline" style="margin-bottom: 8px;">Change
                                Avatar</a>
                            <p style="font-size: 0.85rem; color: var(--text-muted);">JPG, GIF or PNG. Max size 800K</p>
                        </div>
                    </div>

                    <div class="grid grid-2" style="margin-bottom: var(--space-lg);">
                        <div class="form-group">
                            <label style="display: block; margin-bottom: 8px; font-weight: 500;">First Name</label>
                            <input type="text" class="form-control" value="Astro" style="width: 100%;">
                        </div>
                        <div class="form-group">
                            <label style="display: block; margin-bottom: 8px; font-weight: 500;">Last Name</label>
                            <input type="text" class="form-control" value="Pilot" style="width: 100%;">
                        </div>
                    </div>

                    <div class="form-group" style="margin-bottom: var(--space-lg);">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">Email Address</label>
                        <input type="email" class="form-control" value="astro.pilot@example.com" style="width: 100%;">
                    </div>

                    <div class="form-group" style="margin-bottom: var(--space-lg);">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500;">Bio</label>
                        <textarea class="form-control" rows="4"
                            style="width: 100%;">Enthusiast stargazer since 2015. Especially interest in planetary observation and astrophotography.</textarea>
                    </div>

                    <h3 style="margin-top: var(--space-2xl); margin-bottom: var(--space-lg); font-size: 1.2rem;">Account
                        Notifications</h3>

                    <div style="margin-bottom: var(--space-md);">
                        <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                            <input type="checkbox" checked style="width: 18px; height: 18px;">
                            <span>Email me about new events</span>
                        </label>
                    </div>
                    <div style="margin-bottom: var(--space-xl);">
                        <label style="display: flex; align-items: center; gap: 12px; cursor: pointer;">
                            <input type="checkbox" checked style="width: 18px; height: 18px;">
                            <span>Email me about forum replies</span>
                        </label>
                    </div>

                    <div
                        style="display: flex; gap: var(--space-md); border-top: 1px solid var(--border); padding-top: var(--space-xl);">
                        <button type="submit" class="btn btn-primary">Save Changes</a>
                        <button type="button" class="btn btn-outline">Cancel</a>
                    </div>
                </form>
            </div>
